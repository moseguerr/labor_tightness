{% extends "base.html" %}

{% block progress_bar %}
{% include "components/progress_bar.html" with section="Posting Review" current=1 total=2 %}
{% endblock %}

{% block content %}
<div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 space-y-4">
    <p class="text-sm text-slate-600 leading-relaxed">
        Thank you for your rankings.
    </p>

    <form method="post">
        {% csrf_token %}
        <button type="submit"
                class="btn-primary bg-primary-500 hover:bg-primary-700 text-white
                       font-medium py-2.5 px-6 rounded-lg mt-4">
            Next Task
        </button>
    </form>
</div>
{% endblock %}
