<!-- Progress bar component. Usage: include "components/progress_bar.html" with section=X current=N total=M -->
<div class="bg-white border-b border-gray-100 px-4 py-3">
    <div class="max-w-3xl mx-auto">
        <div class="flex items-center justify-between text-xs text-slate-500 mb-1.5">
            <span class="font-medium">{{ section }}</span>
            <span>{{ current }} of {{ total }}</span>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-1">
            <div class="bg-primary-500 h-1 rounded-full transition-all duration-500 ease-out"
                 style="width: {% widthratio current total 100 %}%"></div>
        </div>
    </div>
</div>
