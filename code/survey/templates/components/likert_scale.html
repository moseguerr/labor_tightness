<!-- Likert scale component. Usage: include "components/likert_scale.html" with name=X low_label=Y high_label=Z points=7 -->
<div class="likert-scale">
    <div class="flex items-center justify-between gap-1 sm:gap-2">
        {% for i in "1234567" %}
        <label class="flex flex-col items-center cursor-pointer group">
            <input type="radio" name="{{ name }}" value="{{ i }}"
                   class="sr-only peer" {% if required %}required{% endif %}>
            <div class="w-10 h-10 sm:w-11 sm:h-11 rounded-full border-2 border-gray-300
                        flex items-center justify-center text-sm font-medium text-slate-500
                        peer-checked:bg-primary-500 peer-checked:border-primary-500 peer-checked:text-white
                        group-hover:border-primary-300 transition-all duration-150">
                {{ i }}
            </div>
        </label>
        {% endfor %}
    </div>
    <div class="flex justify-between text-xs text-slate-400 mt-2 px-1">
        <span>{{ low_label }}</span>
        <span>{{ high_label }}</span>
    </div>
</div>
