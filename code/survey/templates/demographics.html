{% extends "base.html" %}

{% block content %}
<div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8 sm:p-10 max-w-2xl mx-auto">
    <h2 class="text-xl font-semibold text-slate-800 mb-2">About You</h2>
    <p class="text-slate-500 text-sm mb-8">
        Finally, a few demographic questions. All answers are anonymous and optional.
    </p>

    <form method="post" class="space-y-6">
        {% csrf_token %}

        <!-- Age -->
        <div>
            <label for="age" class="block text-sm font-medium text-slate-700 mb-2">Age</label>
            <input type="number" id="age" name="age" min="18" max="100"
                   class="w-32 rounded-lg border border-gray-300 px-4 py-3 text-sm
                          focus:border-primary-500 focus:ring-1 focus:ring-primary-500"
                   placeholder="e.g. 28">
        </div>

        <!-- Gender -->
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Gender</label>
            <div class="space-y-2">
                <label class="flex items-center gap-3">
                    <input type="radio" name="gender" value="female"
                           class="w-4 h-4 text-primary-500">
                    <span class="text-sm text-slate-700">Female</span>
                </label>
                <label class="flex items-center gap-3">
                    <input type="radio" name="gender" value="male"
                           class="w-4 h-4 text-primary-500">
                    <span class="text-sm text-slate-700">Male</span>
                </label>
                <label class="flex items-center gap-3">
                    <input type="radio" name="gender" value="non_binary"
                           class="w-4 h-4 text-primary-500">
                    <span class="text-sm text-slate-700">Non-binary / Third gender</span>
                </label>
                <label class="flex items-center gap-3">
                    <input type="radio" name="gender" value="self_describe"
                           class="w-4 h-4 text-primary-500">
                    <span class="text-sm text-slate-700">Prefer to self-describe</span>
                </label>
                <input type="text" name="gender_self_describe"
                       class="ml-7 w-64 rounded-lg border border-gray-300 px-4 py-2 text-sm
                              focus:border-primary-500 focus:ring-1 focus:ring-primary-500
                              placeholder-slate-400"
                       placeholder="Please specify">
                <label class="flex items-center gap-3">
                    <input type="radio" name="gender" value="prefer_not"
                           class="w-4 h-4 text-primary-500">
                    <span class="text-sm text-slate-700">Prefer not to say</span>
                </label>
            </div>
        </div>

        <!-- Education -->
        <div>
            <label for="education" class="block text-sm font-medium text-slate-700 mb-2">
                Highest level of education completed
            </label>
            <select id="education" name="education"
                    class="w-full rounded-lg border border-gray-300 px-4 py-3 text-sm
                           focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
                <option value="">Select...</option>
                <option value="less_than_hs">Less than high school</option>
                <option value="high_school">High school diploma / GED</option>
                <option value="some_college">Some college, no degree</option>
                <option value="associates">Associate's degree</option>
                <option value="bachelors">Bachelor's degree</option>
                <option value="masters">Master's degree</option>
                <option value="doctorate">Doctoral or professional degree</option>
                <option value="prefer_not">Prefer not to say</option>
            </select>
        </div>

        <!-- Employment status -->
        <div>
            <label for="employment_status" class="block text-sm font-medium text-slate-700 mb-2">
                Current employment status
            </label>
            <select id="employment_status" name="employment_status"
                    class="w-full rounded-lg border border-gray-300 px-4 py-3 text-sm
                           focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
                <option value="">Select...</option>
                <option value="full_time">Employed full-time</option>
                <option value="part_time">Employed part-time</option>
                <option value="self_employed">Self-employed</option>
                <option value="unemployed_looking">Unemployed, looking for work</option>
                <option value="unemployed_not_looking">Unemployed, not looking for work</option>
                <option value="student">Student</option>
                <option value="retired">Retired</option>
                <option value="other">Other</option>
                <option value="prefer_not">Prefer not to say</option>
            </select>
            <input type="text" name="employment_other"
                   class="mt-2 w-full rounded-lg border border-gray-300 px-4 py-2 text-sm
                          focus:border-primary-500 focus:ring-1 focus:ring-primary-500
                          placeholder-slate-400"
                   placeholder="If other, please specify">
        </div>

        <!-- Industry -->
        <div>
            <label for="industry" class="block text-sm font-medium text-slate-700 mb-2">
                Industry (current or most recent job)
            </label>
            <select id="industry" name="industry"
                    class="w-full rounded-lg border border-gray-300 px-4 py-3 text-sm
                           focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
                <option value="">Select...</option>
                <option value="tech">Technology</option>
                <option value="healthcare">Healthcare</option>
                <option value="education">Education</option>
                <option value="finance">Finance / Banking</option>
                <option value="retail">Retail / Consumer goods</option>
                <option value="manufacturing">Manufacturing</option>
                <option value="government">Government / Public sector</option>
                <option value="nonprofit">Non-profit / NGO</option>
                <option value="consulting">Consulting / Professional services</option>
                <option value="media">Media / Entertainment</option>
                <option value="other">Other</option>
                <option value="not_applicable">Not applicable</option>
            </select>
            <input type="text" name="industry_other"
                   class="mt-2 w-full rounded-lg border border-gray-300 px-4 py-2 text-sm
                          focus:border-primary-500 focus:ring-1 focus:ring-primary-500
                          placeholder-slate-400"
                   placeholder="If other, please specify">
        </div>

        <!-- Work experience -->
        <div>
            <label for="work_experience_years" class="block text-sm font-medium text-slate-700 mb-2">
                Years of work experience
            </label>
            <input type="number" id="work_experience_years" name="work_experience_years"
                   min="0" max="60"
                   class="w-32 rounded-lg border border-gray-300 px-4 py-3 text-sm
                          focus:border-primary-500 focus:ring-1 focus:ring-primary-500"
                   placeholder="e.g. 5">
        </div>

        <!-- Last job search -->
        <div>
            <label for="last_job_search" class="block text-sm font-medium text-slate-700 mb-2">
                When did you last search for a job?
            </label>
            <select id="last_job_search" name="last_job_search"
                    class="w-full rounded-lg border border-gray-300 px-4 py-3 text-sm
                           focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
                <option value="">Select...</option>
                <option value="currently">I am currently searching</option>
                <option value="6_months">Within the last 6 months</option>
                <option value="1_year">6 months to 1 year ago</option>
                <option value="2_years">1 to 2 years ago</option>
                <option value="3_plus_years">More than 2 years ago</option>
                <option value="never">I have never searched for a job</option>
            </select>
        </div>

        <div class="pt-4">
            <button type="submit"
                    class="btn-primary bg-primary-500 hover:bg-primary-700 text-white
                           font-medium py-3 px-8 rounded-lg text-base">
                Finish
            </button>
        </div>
    </form>
</div>
{% endblock %}
