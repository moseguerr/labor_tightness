{% extends "base.html" %}

{% block content %}
<div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8 sm:p-10 max-w-2xl mx-auto">
    <h2 class="text-xl font-semibold text-slate-800 mb-2">About You</h2>
    <p class="text-slate-500 text-sm mb-8">
        Finally, a few demographic questions. All answers are anonymous and optional.
    </p>

    <form method="post" class="space-y-6" id="demographics-form">
        {% csrf_token %}

        <!-- Age -->
        <div>
            <label for="age" class="block text-sm font-medium text-slate-700 mb-2">How old are you?</label>
            <input type="number" id="age" name="age" min="16" max="100"
                   class="w-32 rounded-lg border border-gray-300 px-4 py-3 text-sm
                          focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
        </div>

        <!-- Gender -->
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">What is your gender?</label>
            <div class="space-y-2">
                <label class="flex items-center gap-3">
                    <input type="radio" name="gender" value="female" class="w-4 h-4 text-primary-500">
                    <span class="text-sm text-slate-700">Female</span>
                </label>
                <label class="flex items-center gap-3">
                    <input type="radio" name="gender" value="male" class="w-4 h-4 text-primary-500">
                    <span class="text-sm text-slate-700">Male</span>
                </label>
                <label class="flex items-center gap-3">
                    <input type="radio" name="gender" value="other" class="w-4 h-4 text-primary-500">
                    <span class="text-sm text-slate-700">Other</span>
                </label>
                <input type="text" name="gender_other" id="gender-other-input"
                       class="ml-7 w-64 rounded-lg border border-gray-300 px-4 py-2 text-sm
                              focus:border-primary-500 focus:ring-1 focus:ring-primary-500 hidden"
                       placeholder="Please specify">
            </div>
        </div>

        <!-- Race/Ethnicity -->
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">What is your race/ethnicity?</label>
            <div class="space-y-2">
                <label class="flex items-center gap-3">
                    <input type="radio" name="race" value="white" class="w-4 h-4 text-primary-500">
                    <span class="text-sm text-slate-700">White/Caucasian</span>
                </label>
                <label class="flex items-center gap-3">
                    <input type="radio" name="race" value="black" class="w-4 h-4 text-primary-500">
                    <span class="text-sm text-slate-700">Black/African American</span>
                </label>
                <label class="flex items-center gap-3">
                    <input type="radio" name="race" value="hispanic" class="w-4 h-4 text-primary-500">
                    <span class="text-sm text-slate-700">Hispanic</span>
                </label>
                <label class="flex items-center gap-3">
                    <input type="radio" name="race" value="asian" class="w-4 h-4 text-primary-500">
                    <span class="text-sm text-slate-700">Asian</span>
                </label>
                <label class="flex items-center gap-3">
                    <input type="radio" name="race" value="native_american" class="w-4 h-4 text-primary-500">
                    <span class="text-sm text-slate-700">Native American</span>
                </label>
                <label class="flex items-center gap-3">
                    <input type="radio" name="race" value="pacific_islander" class="w-4 h-4 text-primary-500">
                    <span class="text-sm text-slate-700">Pacific Islander</span>
                </label>
                <label class="flex items-center gap-3">
                    <input type="radio" name="race" value="other" class="w-4 h-4 text-primary-500">
                    <span class="text-sm text-slate-700">Other</span>
                </label>
                <input type="text" name="race_other" id="race-other-input"
                       class="ml-7 w-64 rounded-lg border border-gray-300 px-4 py-2 text-sm
                              focus:border-primary-500 focus:ring-1 focus:ring-primary-500 hidden"
                       placeholder="Please specify">
            </div>
        </div>

        <!-- Parents' Income -->
        <div>
            <label for="parents_income" class="block text-sm font-medium text-slate-700 mb-2">
                Please estimate your parents' income
            </label>
            <select id="parents_income" name="parents_income"
                    class="w-full rounded-lg border border-gray-300 px-4 py-3 text-sm
                           focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
                <option value="">Select...</option>
                <option value="50k_or_less">$50,000 or less</option>
                <option value="50k_75k">$50,001 - $75,000</option>
                <option value="75k_100k">$75,001 - $100,000</option>
                <option value="100k_150k">$100,001 - $150,000</option>
                <option value="150k_200k">$150,001 - $200,000</option>
                <option value="200k_300k">$200,001 - $300,000</option>
                <option value="300k_500k">$300,001 - $500,000</option>
                <option value="500k_1m">$500,001 - $1,000,000</option>
                <option value="over_1m">More than $1,000,000</option>
            </select>
        </div>

        <!-- High School State - populated by JS to keep template clean -->
        <div>
            <label for="high_school_state" class="block text-sm font-medium text-slate-700 mb-2">
                In what state did you go to high school?
            </label>
            <select id="high_school_state" name="high_school_state"
                    class="w-full rounded-lg border border-gray-300 px-4 py-3 text-sm
                           focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
                <option value="">Select...</option>
            </select>
        </div>

        <!-- Neighborhood -->
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">
                How would you describe the place where you grew up?
            </label>
            <div class="space-y-2">
                <label class="flex items-center gap-3">
                    <input type="radio" name="neighborhood" value="urban" class="w-4 h-4 text-primary-500">
                    <span class="text-sm text-slate-700">Urban</span>
                </label>
                <label class="flex items-center gap-3">
                    <input type="radio" name="neighborhood" value="suburban" class="w-4 h-4 text-primary-500">
                    <span class="text-sm text-slate-700">Suburban</span>
                </label>
                <label class="flex items-center gap-3">
                    <input type="radio" name="neighborhood" value="rural" class="w-4 h-4 text-primary-500">
                    <span class="text-sm text-slate-700">Rural</span>
                </label>
            </div>
        </div>

        <!-- Major -->
        <div>
            <label for="major" class="block text-sm font-medium text-slate-700 mb-2">
                What is (are) your major(s)?
            </label>
            <select id="major" name="major"
                    class="w-full rounded-lg border border-gray-300 px-4 py-3 text-sm
                           focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
                <option value="">Select...</option>
                <option value="finance">Finance</option>
                <option value="accounting">Accounting</option>
                <option value="marketing">Marketing</option>
                <option value="mli">Management, Leadership, and Innovation</option>
                <option value="operations_analytics">Operations and Analytics</option>
                <option value="ipeb">International Political Economy and Business</option>
                <option value="ibrs">International Business Regional Studies</option>
                <option value="foreign_service">Foreign Service Major</option>
                <option value="arts_sciences">Arts and Sciences Major</option>
                <option value="public_policy">Public Policy Major</option>
                <option value="other">Other</option>
                <option value="undeclared">Undeclared</option>
            </select>
            <input type="text" name="major_other" id="major-other-input"
                   class="mt-2 w-full rounded-lg border border-gray-300 px-4 py-2 text-sm
                          focus:border-primary-500 focus:ring-1 focus:ring-primary-500 hidden"
                   placeholder="Please specify">
        </div>

        <!-- Year in Program -->
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">
                Which year of your degree program are you currently in?
            </label>
            <div class="space-y-2">
                <label class="flex items-center gap-3">
                    <input type="radio" name="year_in_program" value="freshman" class="w-4 h-4 text-primary-500">
                    <span class="text-sm text-slate-700">Freshman (1st year)</span>
                </label>
                <label class="flex items-center gap-3">
                    <input type="radio" name="year_in_program" value="sophomore" class="w-4 h-4 text-primary-500">
                    <span class="text-sm text-slate-700">Sophomore (2nd year)</span>
                </label>
                <label class="flex items-center gap-3">
                    <input type="radio" name="year_in_program" value="junior" class="w-4 h-4 text-primary-500">
                    <span class="text-sm text-slate-700">Junior (3rd year)</span>
                </label>
                <label class="flex items-center gap-3">
                    <input type="radio" name="year_in_program" value="senior" class="w-4 h-4 text-primary-500">
                    <span class="text-sm text-slate-700">Senior (4th year)</span>
                </label>
            </div>
        </div>

        <!-- Part-time Job -->
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">
                Do you have a part-time job?
            </label>
            <div class="space-y-2">
                <label class="flex items-center gap-3">
                    <input type="radio" name="has_part_time_job" value="yes" class="w-4 h-4 text-primary-500">
                    <span class="text-sm text-slate-700">Yes</span>
                </label>
                <label class="flex items-center gap-3">
                    <input type="radio" name="has_part_time_job" value="no" class="w-4 h-4 text-primary-500">
                    <span class="text-sm text-slate-700">No</span>
                </label>
            </div>
        </div>

        <!-- English First Language -->
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">
                Is English your first language?
            </label>
            <div class="space-y-2">
                <label class="flex items-center gap-3">
                    <input type="radio" name="english_first_language" value="yes" class="w-4 h-4 text-primary-500">
                    <span class="text-sm text-slate-700">Yes</span>
                </label>
                <label class="flex items-center gap-3">
                    <input type="radio" name="english_first_language" value="no" class="w-4 h-4 text-primary-500">
                    <span class="text-sm text-slate-700">No</span>
                </label>
            </div>
        </div>

        <!-- First Language (conditional) -->
        <div id="first-language-section" class="hidden">
            <label for="first_language" class="block text-sm font-medium text-slate-700 mb-2">
                What is your first language?
            </label>
            <input type="text" id="first_language" name="first_language"
                   class="w-full rounded-lg border border-gray-300 px-4 py-3 text-sm
                          focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
        </div>

        <div class="pt-4">
            <button type="submit"
                    class="btn-primary bg-primary-500 hover:bg-primary-700 text-white
                           font-medium py-3 px-8 rounded-lg text-base">
                Finish
            </button>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function() {
    // Populate state dropdown
    var states = [
        'Alabama','Alaska','Arizona','Arkansas','California','Colorado','Connecticut',
        'Delaware','Florida','Georgia','Hawaii','Idaho','Illinois','Indiana','Iowa',
        'Kansas','Kentucky','Louisiana','Maine','Maryland','Massachusetts','Michigan',
        'Minnesota','Mississippi','Missouri','Montana','Nebraska','Nevada','New Hampshire',
        'New Jersey','New Mexico','New York','North Carolina','North Dakota','Ohio',
        'Oklahoma','Oregon','Pennsylvania','Rhode Island','South Carolina','South Dakota',
        'Tennessee','Texas','Utah','Vermont','Virginia','Washington','West Virginia',
        'Wisconsin','Wyoming','District of Columbia','Outside the United States'
    ];
    var sel = document.getElementById('high_school_state');
    states.forEach(function(s) {
        var opt = document.createElement('option');
        opt.value = s.toLowerCase().replace(/\s+/g, '_');
        opt.textContent = s;
        sel.appendChild(opt);
    });

    // Conditional show/hide for "Other" text inputs
    function setupOtherToggle(radioName, otherInputId) {
        var radios = document.querySelectorAll('input[name="' + radioName + '"]');
        var input = document.getElementById(otherInputId);
        radios.forEach(function(r) {
            r.addEventListener('change', function() {
                if (r.value === 'other' && r.checked) {
                    input.classList.remove('hidden');
                } else {
                    input.classList.add('hidden');
                }
            });
        });
    }
    setupOtherToggle('gender', 'gender-other-input');
    setupOtherToggle('race', 'race-other-input');

    // Major "Other" toggle
    var majorSel = document.getElementById('major');
    var majorOther = document.getElementById('major-other-input');
    majorSel.addEventListener('change', function() {
        if (majorSel.value === 'other') {
            majorOther.classList.remove('hidden');
        } else {
            majorOther.classList.add('hidden');
        }
    });

    // English first language -> show first language input
    var engRadios = document.querySelectorAll('input[name="english_first_language"]');
    var langSection = document.getElementById('first-language-section');
    engRadios.forEach(function(r) {
        r.addEventListener('change', function() {
            if (r.value === 'no' && r.checked) {
                langSection.classList.remove('hidden');
            } else {
                langSection.classList.add('hidden');
            }
        });
    });
})();
</script>
{% endblock %}
