{% extends "base.html" %}

{% block content %}
<div class="max-w-xl mx-auto">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8 sm:p-10">
        <h1 class="text-2xl font-semibold text-slate-800 mb-2">Welcome</h1>
        <p class="text-slate-600 mb-6">
            Thank you for participating in this research study. You will be reading and
            evaluating job postings. The study takes approximately 19 minutes.
        </p>
        <p class="text-slate-600 mb-8">
            Click the button below to begin.
        </p>

        <form method="post">
            {% csrf_token %}
            <button type="submit"
                    class="btn-primary w-full bg-primary-500 hover:bg-primary-700 text-white
                           font-medium py-3 px-6 rounded-lg text-base">
                Begin Study
            </button>
        </form>
    </div>
</div>
{% endblock %}
